services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data --no-input 2>/dev/null;
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./backend/templates/RODs_Ex.pdf:/app/templates/RODs_Ex.pdf
      - ./eld_template_mapping.json:/app/eld_template_mapping.json
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DEBUG=True
      - DB_NAME=hos_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - ORS_API_KEY=${ORS_API_KEY:-}
      - ELD_MAPPING_PATH=/app/eld_template_mapping.json
      - RODS_TEMPLATE_PATH=/app/templates/RODs_Ex.pdf

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
